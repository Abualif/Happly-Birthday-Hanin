<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Hanin 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#fff6f7;
}

/* BACKGROUND */

.hero{
    min-height:100vh;

    background:
    linear-gradient(rgba(255,255,255,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.4) 1px, transparent 1px),
    #fdeff1;

    background-size:30px 30px;

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px;
}

/* BANNER */

.banner-left{
    position:absolute;
    top:20px;
    left:0;
    width:180px;
    height:70px;
    background:
    repeating-linear-gradient(
      90deg,
      #ff7f9d 0 20px,
      #ffb3c2 20px 40px
    );

    clip-path: polygon(
      0 0,
      100% 0,
      95% 100%,
      90% 0,
      85% 100%,
      80% 0,
      75% 100%,
      70% 0,
      65% 100%,
      60% 0,
      55% 100%,
      50% 0,
      45% 100%,
      40% 0,
      35% 100%,
      30% 0,
      25% 100%,
      20% 0,
      15% 100%,
      10% 0,
      5% 100%,
      0 0
    );
}

.banner-right{
    position:absolute;
    top:20px;
    right:0;
    width:180px;
    height:70px;
    background:
    repeating-linear-gradient(
      90deg,
      #ff7f9d 0 20px,
      #ffb3c2 20px 40px
    );

    clip-path: polygon(
      0 0,
      100% 0,
      95% 100%,
      90% 0,
      85% 100%,
      80% 0,
      75% 100%,
      70% 0,
      65% 100%,
      60% 0,
      55% 100%,
      50% 0,
      45% 100%,
      40% 0,
      35% 100%,
      30% 0,
      25% 100%,
      20% 0,
      15% 100%,
      10% 0,
      5% 100%,
      0 0
    );
}

/* CONTENT */

.container{
    width:100%;
    max-width:1100px;

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:30px;
}

/* TEXT */

.left{
    flex:1;
}

.title-top{
    font-size:4rem;
    font-weight:800;
    color:white;

    text-shadow:
    3px 3px 0 #333,
    -3px 3px 0 #333,
    3px -3px 0 #333,
    -3px -3px 0 #333;

    opacity:0;
    transform:translateX(-100px);
    animation:slideIn 1s forwards;
}

.title-bottom{
    font-size:4rem;
    font-weight:800;
    color:#ff7f9d;

    text-shadow:
    3px 3px 0 #333;

    opacity:0;
    transform:translateX(-100px);

    animation:slideIn 1s .4s forwards;
}

.date{
    margin-top:15px;

    display:inline-block;

    background:#ff7f9d;

    color:white;

    padding:10px 30px;

    border-radius:999px;

    font-weight:600;
}

.btn{
    margin-top:30px;

    border:none;

    background:#333;

    color:white;

    padding:15px 28px;

    border-radius:999px;

    font-size:1rem;

    cursor:pointer;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

/* PHOTO */

.right{
    flex:1;
    display:flex;
    justify-content:center;
}

.circle{

    width:320px;
    height:320px;

    border-radius:50%;

    overflow:hidden;

    border:8px solid #444;

    box-shadow:0 15px 35px rgba(0,0,0,.2);

    animation:float 4s infinite ease-in-out;
}

.circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* POPUP */

.popup{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup.active{
    display:flex;
}

.card{

    width:90%;
    max-width:420px;

    background:white;

    border-radius:25px;

    padding:30px;

    text-align:center;

    animation:popup .4s ease;
}

.gift{
    font-size:4rem;
}

.card h2{
    margin:15px 0;
    color:#ff7f9d;
}

.card p{
    line-height:1.9;
    color:#555;
}

.close-btn{
    margin-top:20px;

    border:none;

    background:#ff7f9d;

    color:white;

    padding:12px 25px;

    border-radius:999px;

    cursor:pointer;
}

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes float{
    50%{
        transform:translateY(-12px);
    }
}

@keyframes popup{
    from{
        transform:scale(.7);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:768px){

.container{
    flex-direction:column-reverse;
    text-align:center;
}

.title-top,
.title-bottom{
    font-size:3rem;
}

.circle{
    width:260px;
    height:260px;
}

}

</style>
</head>

<body>

<div class="hero">

    <div class="banner-left"></div>
    <div class="banner-right"></div>

    <div class="container">

        <div class="left">

            <div class="title-top">
                Happy
            </div>

            <div class="title-bottom">
                Birthday
            </div>

            <div class="date">
                12 June 🎂
            </div>

            <br>

            <button class="btn" onclick="openGift()">
                Click Here To See What's Next 🎁
            </button>

        </div>

        <div class="right">

            <div class="circle">
                <img src="Hanin.jfif">
            </div>

        </div>

    </div>

</div>

<div class="popup" id="giftPopup">

    <div class="card">

        <div class="gift">
            🎁
        </div>

        <h2>
            Happy Birthday Hanin
        </h2>

        <p>

            Sehat selalu, panjang umur,
            rezekinya lancar,
            dan cepat mendapat kerja yaaa.

            <br><br>

            Semoga di umur yang ke-23 ini
            semakin dewasa,
            semakin pintar,
            makin cantik,
            dan semua yang dipengen dikabulin.

            <br><br>

            Pokoknya...

            <br>

            <b>All The Best For You ❤️</b>

        </p>

        <button
        class="close-btn"
        onclick="closeGift()">

            Awww Thank You ❤️

        </button>

    </div>

</div>

<script>

function openGift(){
    document
    .getElementById("giftPopup")
    .classList.add("active");
}

function closeGift(){
    document
    .getElementById("giftPopup")
    .classList.remove("active");
}

</script>

</body>
</html>
